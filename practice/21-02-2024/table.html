<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thời Khóa Biếu</title>
    <link rel="stylesheet" href="./table.css">
</head>

<body>
    <table border="1">
        <h1 class="centered">THỜI KHÓA BIỂU</h1>
        <tr>
            <th rowspan="2">Thứ</th>
            <th colspan="2">Hoạt đông</th>
        </tr>
        <tr>
            <th><b>Sáng</b></th>
            <th><b>Chiều</b></th>
        </tr>
        <tr>
            <td><b>Thứ hai</b></td>
            <td>Thể dục</td>
            <td>HD trò chơi mới</td>
        </tr>
        <tr>
            <td><b>Thứ ba</b></td>
            <td>Nhận biết tập nói</td>
            <td>Rèn nề nếp kỹ năng sống</td>
        </tr>
        <tr>
            <td><b>Thứ tư</b></td>
            <td>Âm nhạc</td>
            <td>Vui chơi</td>
        </tr>
        <tr>
            <td><b>Thứ năm</b></td>
            <td>Văn học</td>
            <td>Nhận biết giá trị sống</td>
        </tr>
    </table>
</body>

</html>
